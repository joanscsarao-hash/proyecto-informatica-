<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoPlato | Hazte Voluntario</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #593737;
            --bg-surface: #6e4a4a;
            --accent: #ffb38a;
            --text-main: #f4eee8;
            --text-dim: #c9b4a9;
            --glass-border: rgba(255, 179, 138, 0.2);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            background: radial-gradient(circle at 50% 50%, #6e4a4a 0%, var(--bg-dark) 100%);
            min-height: 100vh;
        }

        /* Navegación */
        nav {
            padding: 25px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(15px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(244, 238, 232, 0.05);
            background-color: rgba(89, 55, 55, 0.8);
        }

        .logo { font-weight: 800; font-size: 1.4rem; letter-spacing: -1px; text-transform: uppercase; }
        .logo span { color: var(--accent); }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            margin-left: 30px;
            font-weight: 600;
            font-size: 0.85rem;
            transition: var(--transition);
            padding: 8px 16px;
            border-radius: 4px;
        }

        .nav-links a:hover, .nav-links a.active { 
            color: var(--accent);
            border: 1px solid var(--glass-border);
            background: rgba(255, 179, 138, 0.05);
        }

        /* Contenido Principal */
        .content-wrapper {
            padding: 150px 8% 80px;
            max-width: 800px;
            margin: 0 auto;
        }

        .form-card {
            background: var(--bg-surface);
            padding: 50px;
            border-radius: 12px;
            border: 1px solid rgba(244, 238, 232, 0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        .badge {
            background: rgba(255, 179, 138, 0.1);
            color: var(--accent);
            padding: 6px 16px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 800;
            margin-bottom: 20px;
            display: inline-block;
            border: 1px solid var(--glass-border);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        h1 span { color: var(--accent); }

        p.subtitle {
            color: var(--text-dim);
            margin-bottom: 40px;
            font-size: 1rem;
        }

        /* Formulario Estilizado */
        .form-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-block { text-align: left; margin-bottom: 20px; }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            margin-bottom: 8px;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px;
            background: rgba(89, 55, 55, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            color: var(--text-main);
            font-family: inherit;
            transition: var(--transition);
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(89, 55, 55, 0.8);
        }

        .btn-submit {
            background: var(--accent);
            color: var(--bg-dark);
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 6px;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 20px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 179, 138, 0.2);
            filter: brightness(1.1);
        }

        footer {
            padding: 40px 8%;
            border-top: 1px solid rgba(244, 238, 232, 0.05);
            display: flex;
            justify-content: space-between;
            color: var(--text-dim);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 40px;
        }

        @media (max-width: 768px) {
            .form-group { grid-template-columns: 1fr; }
            .form-card { padding: 30px; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Eco<span>Plato</span></div>
        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="ods.html">Ods</a>
            <a href="registro.html" class="active">Registro</a>
            <a href="nosotros.html">Nosotros</a
            <a href="educacion.html">Educación</a>
        </div>
    </nav>

    <main class="content-wrapper">
        <div class="badge">Acción Comunitaria</div>
        
        <div class="form-card">
            <h1>Hazte <span>Voluntario</span></h1>
            <p class="subtitle">Únete a nuestra brigada escolar para combatir el desperdicio.</p>
            
            <form id="registroForm">
                <div class="form-group">
                    <div>
                        <label>Nombre Completo</label>
                        <input type="text" id="nombre" placeholder="Tu nombre" required>
                    </div>
                    <div>
                        <label>Email Institucional</label>
                        <input type="email" placeholder="usuario@uvm.edu" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <div>
                        <label>Teléfono / WhatsApp</label>
                        <input type="text" id="telefono" placeholder="+52 ...">
                    </div>
                    <div>
                        <label>Grado / Grupo</label>
                        <input type="text" placeholder="Ej: 4to Semestre" required>
                    </div>
                </div>

                <div class="input-block">
                    <label>Disponibilidad</label>
                    <select>
                        <option>Descansos Matutinos</option>
                        <option>Segundo descanso</option>
                        <option>Eventos Especiales</option>
                    </select>
                </div>

                <div class="input-block">
                    <label>¿Por qué quieres ayudar?</label>
                    <textarea rows="3" placeholder="Tu motivación para reducir el desperdicio..."></textarea>
                </div>

                <button type="submit" class="btn-submit">Enviar Registro</button>
            </form>
        </div>
    </main>

    <footer>
        <div>EcoPlato © 2026 / Terracota System</div>
        <div>ODS 12 VOLUNTEER NETWORK</div>
    </footer>

    <script>
        document.getElementById('registroForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const nombre = document.getElementById('nombre').value.toLowerCase();
            const tel = document.getElementById('telefono').value;

            // Lógica para el fondo especial
            if (nombre === 'ado' && tel === '231020') {
                document.body.style.background = "url('image_0fd443.jpg') no-repeat center center fixed";
                document.body.style.backgroundSize = "cover";
                alert('¡Modo Debut activado!');
            } else {
                alert('¡Gracias por unirte a EcoPlato! Tu registro ha sido enviado.');
            }
        });
    </script>
</body>
</html>
